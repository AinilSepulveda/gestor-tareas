<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión — GestorTareas</title>
  <script src="../js/origen.js"></script>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="../css/estilos.css" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100 justify-content-center bg-light">
<div id="loader" style="display:none"><div class="spinner-border text-primary" role="status"></div></div>
<div id="alerta-container"></div>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-sm-10 col-md-7 col-lg-5">
      <div class="text-center mb-4">
        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px;">
          <i class="bi bi-kanban fs-3"></i>
        </div>
        <h1 class="h4 fw-bold">GestorTareas</h1>
        <p class="text-muted">Inicia sesión en tu cuenta</p>
      </div>
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form id="form-login" novalidate>
            <div class="mb-3">
              <label class="form-label" for="email">Correo electrónico</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="email" placeholder="usuario@correo.cl" required autocomplete="email"/>
                <div class="invalid-feedback">Ingresa un email válido.</div>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" placeholder="Mínimo 6 caracteres" required minlength="6"/>
                <button class="btn btn-outline-secondary" type="button" id="btn-ver-pass" tabindex="-1"><i class="bi bi-eye"></i></button>
                <div class="invalid-feedback">Ingresa tu contraseña.</div>
              </div>
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
              </button>
            </div>
          </form>
        </div>
      </div>
      <p class="text-center mt-3 text-muted">
        ¿No tienes cuenta? <a href="registro.html" class="text-primary fw-semibold">Regístrate aquí</a>
      </p>
      <p class="text-center"><a href="../index.html" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Volver al Dashboard</a></p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
  inicializarLogin();
  document.getElementById('btn-ver-pass').addEventListener('click', () => {
    const input = document.getElementById('password');
    const icono = document.querySelector('#btn-ver-pass i');
    input.type = input.type === 'password' ? 'text' : 'password';
    icono.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  });
</script>
</body>
</html>
