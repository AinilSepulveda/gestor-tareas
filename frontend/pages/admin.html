<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administración de Usuarios — GestorTareas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="../css/estilos.css" rel="stylesheet"/>
</head>
<body>
<div id="loader" style="display:none"><div class="spinner-border text-primary" role="status"></div></div>
<div id="alerta-container"></div>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="../index.html"><i class="bi bi-kanban me-2"></i>GestorTareas</a>
    <div class="navbar-nav ms-auto">
      <span class="nav-link text-white" id="nav-usuario"></span>
      <button class="btn btn-outline-light btn-sm ms-2" id="btn-logout"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
    </div>
  </div>
</nav>

<main class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h4 fw-bold mb-0"><i class="bi bi-people me-2"></i>Gestión de Usuarios</h1>
      <p class="text-muted small">Solo administradores</p>
    </div>
    <a href="../index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table tabla-tareas table-hover mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Email</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Registro</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-usuarios-body">
            <tr><td colspan="7" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div> Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    if (!estaAutenticado()) { window.location.href = 'login.html'; return; }
    const user = obtenerUsuarioActual();
    if (!user.esAdministrador()) { window.location.href = '../index.html'; return; }
    actualizarNavbar();
    document.getElementById('btn-logout').addEventListener('click', cerrarSesion);

    try {
      const resp = await usuarios.listar();
      const tbody = document.getElementById('tabla-usuarios-body');
      tbody.innerHTML = resp.datos.usuarios.map(u => `
        <tr>
          <td>${u.id}</td>
          <td><strong>${u.nombre}</strong></td>
          <td>${u.email}</td>
          <td><span class="badge ${u.rol === 'administrador' ? 'bg-danger' : 'bg-secondary'}">${u.rol}</span></td>
          <td><span class="badge ${u.activo ? 'bg-success' : 'bg-warning text-dark'}">${u.activo ? 'Activo' : 'Inactivo'}</span></td>
          <td>${new Date(u.createdAt).toLocaleDateString('es-CL')}</td>
          <td>
            <button class="btn btn-sm btn-outline-danger" onclick="desactivar(${u.id})" ${!u.activo ? 'disabled' : ''}>
              <i class="bi bi-person-x"></i>
            </button>
          </td>
        </tr>
      `).join('');
    } catch(err) {
      mostrarAlerta('Error al cargar usuarios. Verifica que seas administrador.', 'danger');
    }
  });

  const desactivar = async (id) => {
    if (!confirm('¿Desactivar este usuario?')) return;
    try {
      await usuarios.actualizar(id, { activo: false });
      mostrarAlerta('Usuario desactivado.', 'success');
      location.reload();
    } catch(err) {
      mostrarAlerta('Error al desactivar usuario.', 'danger');
    }
  };
</script>
</body>
</html>
